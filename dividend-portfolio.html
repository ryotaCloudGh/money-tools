<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配当ポートフォリオ計算機</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --danger-color: #dc2626;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        h1 { font-size: 1.5rem; margin-bottom: 24px; text-align: center; }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .summary-label { font-size: 0.875rem; color: #64748b; margin-bottom: 4px; }
        .summary-value { font-size: 1.25rem; font-weight: bold; color: var(--primary-color); }

        .input-section { margin-bottom: 24px; }

        .stock-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }

        input {
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
        }

        input.amount-input { width: 120px; }
        input.yield-input { width: 80px; }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        .btn-add { background: var(--primary-color); color: white; width: 100%; margin-top: 8px; }
        .btn-del { background: var(--danger-color); color: white; padding: 8px; }

        .target-section {
            margin: 24px 0;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }

        .chart-container {
            position: relative;
            margin: auto;
            height: 300px;
            width: 100%;
        }

        @media (max-width: 600px) {
            .stock-row { flex-wrap: wrap; }
            .stock-row input[name="name"] { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="display:inline-block; margin-bottom:16px; font-size:0.875rem; color:#64748b; text-decoration:none;">← ツール一覧</a>
    <h1>配当ポートフォリオ計算機</h1>

    <div class="summary-grid">
        <div class="summary-card">
            <div class="summary-label">年間配当合計</div>
            <div class="summary-value" id="year-total">0 円</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">月間配当合計</div>
            <div class="summary-value" id="month-total">0 円</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">平均利回り</div>
            <div class="summary-value" id="avg-yield">0 %</div>
        </div>
    </div>

    <div class="input-section">
        <div id="stock-list">
            </div>
        <button class="btn btn-add" onclick="addStockRow()">＋銘柄を追加</button>
    </div>

    <div class="target-section">
        <div class="summary-label">目標とする月収（円）</div>
        <input type="text" id="target-monthly" value="100,000" style="width: 100%; box-sizing: border-box; margin-bottom: 12px;" oninput="formatComma(this); calculate()">
        <div class="summary-card" style="background: #eff6ff;">
            <div class="summary-label">必要追加投資額（現在の平均利回りで計算）</div>
            <div class="summary-value" id="needed-investment" style="color: #1e40af;">0 円</div>
        </div>
    </div>

    <div style="margin-bottom:24px; padding:24px; background:#f8fafc; border-radius:16px; border:1px solid #e2e8f0;">
        <p style="margin:0 0 4px; font-size:0.75rem; font-weight:700; color:#64748b; letter-spacing:0.05em;">SPONSORED</p>
        <p style="margin:0 0 16px; font-size:0.95rem; font-weight:600; color:#1e293b;">配当投資をはじめるなら</p>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <a href="#AFFILIATE_URL_SBI" target="_blank" rel="noopener"
               style="flex:1; min-width:200px; display:block; padding:14px 20px; background:#ff6600; color:white; border-radius:10px; text-decoration:none; text-align:center; font-weight:700; font-size:0.9rem;">
                SBI証券で口座開設（無料）→
            </a>
            <a href="#AFFILIATE_URL_RAKUTEN" target="_blank" rel="noopener"
               style="flex:1; min-width:200px; display:block; padding:14px 20px; background:#bf0000; color:white; border-radius:10px; text-decoration:none; text-align:center; font-weight:700; font-size:0.9rem;">
                楽天証券で口座開設（無料）→
            </a>
        </div>
        <p style="margin:12px 0 0; font-size:0.75rem; color:#94a3b8;">※ 当サイトはアフィリエイト広告を利用しています</p>
    </div>

    <div class="chart-container">
        <canvas id="dividendChart"></canvas>
    </div>
</div>

<script>
    let chart = null;

    function formatComma(input) {
        const pos = input.selectionStart;
        const before = input.value.length;
        const raw = input.value.replace(/[^0-9]/g, '');
        if (raw === '') { input.value = ''; return; }
        input.value = parseInt(raw, 10).toLocaleString('ja-JP');
        const diff = input.value.length - before;
        input.setSelectionRange(pos + diff, pos + diff);
    }

    function parseComma(value) {
        return parseFloat(String(value).replace(/,/g, '')) || 0;
    }

    window.onload = () => {
        addStockRow();
    };

    function addStockRow() {
        const container = document.getElementById('stock-list');
        const div = document.createElement('div');
        div.className = 'stock-row';
        div.innerHTML = `
            <input type="text" name="name" placeholder="銘柄名" oninput="calculate()">
            <input type="text" name="amount" placeholder="投資額(円)" class="amount-input" oninput="formatComma(this); calculate()">
            <input type="number" name="yield" placeholder="利回り(%)" class="yield-input" step="0.1" oninput="calculate()">
            <button class="btn btn-del" onclick="removeRow(this)">削除</button>
        `;
        container.appendChild(div);
        calculate();
    }

    function removeRow(btn) {
        const rows = document.querySelectorAll('.stock-row');
        if (rows.length > 1) {
            btn.parentElement.remove();
            calculate();
        }
    }

    function calculate() {
        const rows = document.querySelectorAll('.stock-row');
        let totalAnnual = 0;
        let totalInvestment = 0;
        let labels = [];
        let dataValues = [];

        rows.forEach(row => {
            const name = row.querySelector('input[name="name"]').value || '未設定';
            const amount = parseComma(row.querySelector('input[name="amount"]').value);
            const yieldVal = parseFloat(row.querySelector('input[name="yield"]').value) || 0;

            const annualDividend = amount * (yieldVal / 100);
            totalAnnual += annualDividend;
            totalInvestment += amount;

            if (annualDividend > 0) {
                labels.push(name);
                dataValues.push(Math.round(annualDividend));
            }
        });

        // 基本数値の表示
        document.getElementById('year-total').innerText = Math.round(totalAnnual).toLocaleString() + ' 円';
        document.getElementById('month-total').innerText = Math.round(totalAnnual / 12).toLocaleString() + ' 円';

        const avgYield = totalInvestment > 0 ? (totalAnnual / totalInvestment) * 100 : 0;
        document.getElementById('avg-yield').innerText = avgYield.toFixed(2) + ' %';

        // 必要追加投資額の計算
        const targetMonthly = parseComma(document.getElementById('target-monthly').value);
        const targetAnnual = targetMonthly * 12;
        const gap = targetAnnual - totalAnnual;

        let neededAmount = 0;
        if (gap > 0 && avgYield > 0) {
            neededAmount = gap / (avgYield / 100);
        }
        document.getElementById('needed-investment').innerText = Math.max(0, Math.round(neededAmount)).toLocaleString() + ' 円';

        updateChart(labels, dataValues);
    }

    function updateChart(labels, data) {
        const ctx = document.getElementById('dividendChart').getContext('2d');

        if (chart) {
            chart.destroy();
        }

        if (data.length === 0) return;

        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: [
                        '#2563eb', '#7c3aed', '#db2777', '#ea580c', '#16a34a',
                        '#0891b2', '#4f46e5', '#9333ea', '#c026d3', '#e11d48'
                    ],
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.label || '';
                                if (label) label += ': ';
                                label += context.parsed.toLocaleString() + ' 円';
                                return label;
                            }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
