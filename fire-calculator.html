<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FIRE Blueprint — Precision Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root {
        --primary: #059669; --primary-light: #ecfdf5; --secondary: #1e40af; --bg: #f8fafc;
        --card-bg: rgba(255, 255, 255, 0.95); --text-main: #1e293b; --text-sub: #64748b; --border: #e2e8f0;
    }
    body { background: #f0f9ff; color: var(--text-main); font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; margin: 0; }
    .container { max-width: 1000px; margin: 0 auto; }
    .glass-card { background: var(--card-bg); border-radius: 24px; padding: 32px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid white; position: relative; }
    
    /* --- タイトルセクション --- */
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
    .title-group h1 { margin: 0; font-size: 1.8rem; color: var(--text-main); letter-spacing: -1px; }
    .title-group p { margin: 0; font-size: 0.9rem; color: var(--text-sub); }
    .badge { background: var(--primary-light); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 24px; }
    .input-group { margin-bottom: 16px; position: relative; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--text-main); }
    input[type="number"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 1rem; box-sizing: border-box; transition: all 0.2s; }
    input[type="number"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    input:disabled { background: #f1f5f9; color: #94a3b8; }
    
    .option-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .option-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
    .small-input { width: 80px !important; padding: 6px !important; font-size: 0.9rem !important; }
    
    .summary-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; background: #f8fafc; border-radius: 16px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); }
    .stat-box { text-align: center; }
    .stat-label { font-size: 0.75rem; color: var(--text-sub); display: block; margin-bottom: 4px; }
    .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--secondary); }
    
    canvas { margin-top: 20px; max-height: 400px; }
</style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        
        <div class="header-area">
            <div class="title-group">
                <h1>FIRE Blueprint</h1>
                <p>精密資産寿命シミュレーター（インフレ・税金対応版）</p>
            </div>
            <div class="badge">PRO MODE ACTIVE</div>
        </div>

        <div class="grid">
            <div class="input-section">
                <div class="input-group"><label>現在の年齢</label><input type="number" id="age_now" value="30"></div>
                <div class="input-group"><label>現在の総資産 (万円)</label><input type="number" id="assets" value="500"></div>
                <div class="input-group"><label>毎月の積立額 (万円)</label><input type="number" id="invest" value="15"></div>
                <div class="input-group"><label>期待利回り (%)</label><input type="number" id="ret" value="5" step="0.1"></div>
            </div>
            <div class="input-section">
                <div class="input-group"><label>FIRE目標年齢</label><input type="number" id="age_fire" value="50"></div>
                <div class="input-group"><label>月の取り崩し額 (万円)</label><input type="number" id="spend" value="30"></div>
                
                <div class="input-group">
                    <div class="option-row">
                        <input type="checkbox" id="tax_enabled" checked>
                        <label style="margin:0">運用益課税を計算 (%)</label>
                        <input type="number" id="tax_rate" value="20.315" step="0.001" class="small-input">
                    </div>
                </div>

                <div class="input-group">
                    <div class="option-row">
                        <input type="checkbox" id="inf_enabled" checked>
                        <label style="margin:0">インフレを考慮 (%)</label>
                        <input type="number" id="inf_rate" value="2.0" step="0.1" class="small-input">
                    </div>
                </div>
            </div>
        </div>

        <div class="summary-stats">
            <div class="stat-box"><span class="stat-label">目標必要額(25倍)</span><span class="stat-value" id="res-target">--</span></div>
            <div class="stat-box"><span class="stat-label">FIRE達成時の資産</span><span class="stat-value" id="res-proj" style="color:var(--primary)">--</span></div>
            <div class="stat-box"><span class="stat-label">目標達成率</span><span class="stat-value" id="res-rate">--</span></div>
        </div>

        <canvas id="fireChart"></canvas>
    </div>
</div>

<script>
let myChart = null;
const inputs = document.querySelectorAll('input');

function saveToLocal() {
    const data = {};
    inputs.forEach(el => { data[el.id] = el.type === 'checkbox' ? el.checked : el.value; });
    localStorage.setItem('fire_sim_data', JSON.stringify(data));
}

function loadFromLocal() {
    const saved = localStorage.getItem('fire_sim_data');
    if (saved) {
        const data = JSON.parse(saved);
        inputs.forEach(el => {
            if (data[el.id] !== undefined) {
                if (el.type === 'checkbox') el.checked = data[el.id];
                else el.value = data[el.id];
            }
        });
    }
}

function update() {
    saveToLocal();

    const ageNow = parseInt(document.getElementById('age_now').value) || 0;
    const ageFire = Math.max(ageNow, parseInt(document.getElementById('age_fire').value) || 0);
    const initialAssets = parseFloat(document.getElementById('assets').value) || 0;
    const annualRate = (parseFloat(document.getElementById('ret').value) || 0) / 100;
    const investMonthly = parseFloat(document.getElementById('invest').value) || 0;
    const spendMonthly = parseFloat(document.getElementById('spend').value) || 0;
    
    const taxEnabled = document.getElementById('tax_enabled').checked;
    const taxRateInput = document.getElementById('tax_rate');
    taxRateInput.disabled = !taxEnabled;
    const taxRate = (parseFloat(taxRateInput.value) || 0) / 100;

    const infEnabled = document.getElementById('inf_enabled').checked;
    const infRateInput = document.getElementById('inf_rate');
    infRateInput.disabled = !infEnabled;
    const inflationRate = (parseFloat(infRateInput.value) || 0) / 100;

    let currentAssets = initialAssets;
    let totalCostBasis = initialAssets;
    let historyAssets = [initialAssets];
    let historyRatio = [];
    let historyTax = [0];
    let historyProfitRatio = [0];
    let historySpendWithInf = [spendMonthly * 12];
    let labels = [ageNow + "歳"];
    let assetsAtFire = 0;

    const baseAnnualSpend = spendMonthly * 12;
    historyRatio.push(baseAnnualSpend > 0 ? (initialAssets / baseAnnualSpend).toFixed(1) : 0);

    for (let y = 1; y <= (100 - ageNow); y++) {
        let yearlyTax = 0;
        let currentAnnualSpend = baseAnnualSpend;
        if (infEnabled && y > (ageFire - ageNow)) {
            currentAnnualSpend = baseAnnualSpend * Math.pow(1 + inflationRate, y - (ageFire - ageNow));
        }

        for (let m = 0; m < 12; m++) {
            currentAssets *= (1 + annualRate / 12);
            if (y <= (ageFire - ageNow)) {
                currentAssets += investMonthly;
                totalCostBasis += investMonthly;
            } else {
                let monthlyOut = currentAnnualSpend / 12;
                let profitRatio = currentAssets > totalCostBasis ? (currentAssets - totalCostBasis) / currentAssets : 0;
                let tax = taxEnabled ? (monthlyOut * profitRatio * taxRate) : 0;
                yearlyTax += tax;
                totalCostBasis -= (monthlyOut + tax) * (1 - profitRatio);
                totalCostBasis = Math.max(0, totalCostBasis);
                currentAssets -= (monthlyOut + tax);
            }
        }
        currentAssets = Math.max(0, currentAssets);
        historyAssets.push(Math.round(currentAssets));
        historyRatio.push(currentAnnualSpend > 0 ? (currentAssets / currentAnnualSpend).toFixed(1) : 0);
        historyTax.push(yearlyTax);
        historyProfitRatio.push(currentAssets > totalCostBasis ? (currentAssets - totalCostBasis) / currentAssets : 0);
        historySpendWithInf.push(currentAnnualSpend);
        labels.push((ageNow + y) + "歳");
        if (y === (ageFire - ageNow)) assetsAtFire = currentAssets;
    }

    if (myChart) myChart.destroy();
    myChart = new Chart(document.getElementById('fireChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: '資産総額(万円)', data: historyAssets, borderColor: '#059669', backgroundColor: 'rgba(5, 150, 105, 0.1)', fill: true, tension: 0.3, yAxisID: 'y' },
                { label: '資産寿命倍率(倍)', data: historyRatio, borderColor: '#f59e0b', borderDash: [5, 5], tension: 0.3, pointRadius: 0, yAxisID: 'y1' }
            ]
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            scales: {
                y: { type: 'linear', display: true, position: 'left', ticks: { callback: v => v >= 10000 ? (v/10000).toFixed(1) + '億' : v + '万' } },
                y1: { type: 'linear', display: true, position: 'right', min: 0, max: 50, grid: { drawOnChartArea: false }, ticks: { callback: v => v + '倍' } }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        footer: (items) => {
                            const i = items[0].dataIndex;
                            let lines = ['', '--- 推計詳細 ---'];
                            lines.push(`年支出: ${Math.round(historySpendWithInf[i]).toLocaleString()}万円`);
                            if (i > (ageFire - ageNow) && taxEnabled) {
                                lines.push(`想定税額: 約 ${Math.round(historyTax[i])} 万円`);
                            }
                            return lines.join('\n');
                        }
                    }
                }
            }
        }
    });

    document.getElementById('res-target').innerText = Math.round(baseAnnualSpend * 25).toLocaleString() + "万";
    document.getElementById('res-proj').innerText = Math.round(assetsAtFire).toLocaleString() + "万";
    document.getElementById('res-rate').innerText = ((assetsAtFire / (baseAnnualSpend * 25)) * 100).toFixed(1) + "%";
}

loadFromLocal();
inputs.forEach(el => el.addEventListener('input', update));
update();
</script>

</body>
</html>
