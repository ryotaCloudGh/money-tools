<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Dash — マネー計算ツール集</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .site-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .site-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0 0 8px;
            letter-spacing: -1px;
        }

        .site-header p {
            color: var(--text-sub);
            font-size: 0.95rem;
            margin: 0;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: box-shadow 0.2s, transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .tool-card:hover {
            box-shadow: 0 8px 24px rgba(37,99,235,0.12);
            transform: translateY(-2px);
        }

        .tool-icon {
            font-size: 2rem;
            margin-bottom: 16px;
        }

        .tool-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .tool-desc {
            font-size: 0.875rem;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .tool-tag {
            display: inline-block;
            margin-top: 16px;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
        }

        footer {
            text-align: center;
            margin-top: 64px;
            color: var(--text-sub);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="site-header">
        <h1>Money Dash</h1>
        <p>FIREを目指す人のための、無料マネー計算ツール集</p>
    </header>

    <div class="tools-grid">
        <a class="tool-card" href="fire-calculator.html">
            <div class="tool-icon">🔥</div>
            <div class="tool-name">FIRE シミュレーター</div>
            <div class="tool-desc">資産寿命をインフレ・税金込みで精密計算。何歳でFIREできるかを可視化します。</div>
            <span class="tool-tag">資産形成</span>
        </a>

        <a class="tool-card" href="dividend-portfolio.html">
            <div class="tool-icon">💹</div>
            <div class="tool-name">配当ポートフォリオ計算機</div>
            <div class="tool-desc">保有銘柄の年間・月間配当を合算。目標月収に対して必要な追加投資額を算出します。</div>
            <span class="tool-tag">配当投資</span>
        </a>
    </div>

    <footer>
        &copy; 2026 Money Dash — money-dash.com
    </footer>
</div>

</body>
</html>
